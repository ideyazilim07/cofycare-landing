<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödeme Başarısız - CoffyTab</title>
    <meta name="description" content="Ödeme işlemi başarısız oldu. Lütfen tekrar deneyin.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .failed-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f9fc 0%, #ffffff 100%);
            padding: 40px 20px;
        }

        .failed-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
        }

        .failed-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
        }

        .failed-icon i {
            font-size: 3rem;
            color: white;
        }

        .failed-card h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-bottom: 16px;
            color: var(--color-text-primary);
        }

        .failed-card > p {
            color: var(--color-text-secondary);
            margin-bottom: 32px;
            font-size: 1.0625rem;
        }

        .error-message {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 16px 20px;
            margin-bottom: 32px;
            text-align: left;
            border-radius: 8px;
        }

        .error-message p {
            color: #c62828;
            margin: 0;
        }

        .failed-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .failed-card {
                padding: 32px 24px;
            }

            .failed-card h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="failed-page">
        <div class="failed-card">
            <div class="failed-icon">
                <i class="fas fa-times"></i>
            </div>

            <h1>Ödeme Başarısız</h1>
            <p>Ödeme işlemi gerçekleştirilemedi. Lütfen bilgilerinizi kontrol edip tekrar deneyin.</p>

            <div class="error-message" id="error-message" style="display: none;">
                <p id="error-text"></p>
            </div>

            <div class="failed-actions">
                <a href="checkout.html" class="btn btn-primary">
                    <i class="fas fa-credit-card"></i> Tekrar Dene
                </a>
                
                <a href="https://wa.me/905332182394" class="btn btn-secondary" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    Destek Al
                </a>
                
                <a href="/" class="btn btn-outline">
                    <i class="fas fa-home"></i> Ana Sayfa
                </a>
            </div>
        </div>
    </div>

    <script>
        // Hata mesajını göster
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const errorMsg = urlParams.get('message');
            
            if (errorMsg) {
                document.getElementById('error-text').textContent = decodeURIComponent(errorMsg);
                document.getElementById('error-message').style.display = 'block';
            }
            
            // Sepeti koruyoruz, kullanıcı tekrar deneyebilir
        });
    </script>
</body>
</html>
