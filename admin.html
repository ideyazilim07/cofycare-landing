<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - CoffyTab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; color: #333; }
        
        .admin-header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { font-size: 1.25rem; font-weight: 600; }
        .admin-header .logout-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card h3 {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-card i {
            float: right;
            font-size: 2rem;
            color: #4a90e2;
            opacity: 0.3;
        }
        
        .orders-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .orders-header {
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .orders-header h2 { font-size: 1.125rem; }
        .filter-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }
        .orders-table th {
            background: #f8f9fa;
            padding: 12px 16px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            font-weight: 600;
        }
        .orders-table td {
            padding: 16px;
            border-bottom: 1px solid #eee;
            font-size: 0.875rem;
        }
        .orders-table tr:hover { background: #f8f9fa; }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #cce5ff; color: #004085; }
        .status-shipped { background: #d4edda; color: #155724; }
        .status-delivered { background: #d1ecf1; color: #0c5460; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            color: #666;
        }
        .action-btn:hover { background: #f0f0f0; }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .login-box {
            background: white;
            padding: 48px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 32px;
            color: #1a1a2e;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .login-btn:hover { background: #357abd; }
        
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .admin-container { padding: 16px; }
            .orders-table { font-size: 0.75rem; }
            .orders-table th, .orders-table td { padding: 12px 8px; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Admin Girişi</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="password" required placeholder="••••••">
                </div>
                
                <button type="submit" class="login-btn">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" class="hidden">
        <header class="admin-header">
            <h1><i class="fas fa-cog"></i> CofyCare Admin Panel</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
        </header>

        <div class="admin-container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-shopping-bag"></i>
                    <h3>Toplam Sipariş</h3>
                    <div class="value" id="totalOrders">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-lira-sign"></i>
                    <h3>Toplam Ciro</h3>
                    <div class="value" id="totalRevenue">₺0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <h3>Bekleyen Sipariş</h3>
                    <div class="value" id="pendingOrders">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <h3>Tamamlanan</h3>
                    <div class="value" id="completedOrders">0</div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="orders-section">
                <div class="orders-header">
                    <h2><i class="fas fa-list"></i> Siparişler</h2>
                    <button class="filter-btn" onclick="loadOrders()">
                        <i class="fas fa-sync"></i> Yenile
                    </button>
                </div>
                
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Sipariş No</th>
                            <th>Tarih</th>
                            <th>Müşteri</th>
                            <th>Telefon</th>
                            <th>Tutar</th>
                            <th>Durum</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <!-- Orders will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Simple auth (in production, use proper backend auth)
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'cofycare2026';

        // Check if already logged in
        if (localStorage.getItem('admin_logged_in') === 'true') {
            showDashboard();
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                showDashboard();
            } else {
                alert('Hatalı kullanıcı adı veya şifre!');
            }
        });

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadOrders();
            updateStats();
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            location.reload();
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('coffytab_orders') || '[]');
            const tbody = document.getElementById('ordersTableBody');
            
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">Henüz sipariş bulunmuyor.</td></tr>';
                return;
            }

            // Sort by date (newest first)
            orders.sort((a, b) => new Date(b.date) - new Date(a.date));

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td><strong>${order.orderId}</strong></td>
                    <td>${new Date(order.date).toLocaleDateString('tr-TR')}</td>
                    <td>${order.name} ${order.surname}</td>
                    <td>${order.phone}</td>
                    <td><strong>₺${order.totals.total.toLocaleString('tr-TR')}</strong></td>
                    <td><span class="status-badge status-pending">Beklemede</span></td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn" onclick="viewOrder('${order.orderId}')" title="Görüntüle">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-btn" onclick="window.open('https://wa.me/${order.phone.replace(/\D/g, '')}', '_blank')" title="WhatsApp">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            const orders = JSON.parse(localStorage.getItem('coffytab_orders') || '[]');
            
            document.getElementById('totalOrders').textContent = orders.length;
            
            const totalRevenue = orders.reduce((sum, order) => sum + (order.totals?.total || 0), 0);
            document.getElementById('totalRevenue').textContent = '₺' + totalRevenue.toLocaleString('tr-TR');
            
            // For demo, all orders are pending
            document.getElementById('pendingOrders').textContent = orders.length;
            document.getElementById('completedOrders').textContent = '0';
        }

        function viewOrder(orderId) {
            const orders = JSON.parse(localStorage.getItem('coffytab_orders') || '[]');
            const order = orders.find(o => o.orderId === orderId);
            
            if (order) {
                const itemsList = order.items.map(item => 
                    `• ${item.name} x${item.quantity} = ₺${(item.price * item.quantity).toLocaleString('tr-TR')}`
                ).join('\n');
                
                alert(`SİPARİŞ DETAYI

Sipariş No: ${order.orderId}
Tarih: ${new Date(order.date).toLocaleString('tr-TR')}

MÜŞTERİ BİLGİLERİ:
Ad: ${order.name} ${order.surname}
E-posta: ${order.email}
Telefon: ${order.phone}
Adres: ${order.address}, ${order.district}/${order.city}

ÜRÜNLER:
${itemsList}

TOPLAM: ₺${order.totals.total.toLocaleString('tr-TR')}`);
            }
        }
    </script>
</body>
</html>
