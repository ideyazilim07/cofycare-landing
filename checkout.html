<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödeme - CoffyTab</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CoffyTab kahve makinesi temizleme tableti siparişi - Güvenli ödeme">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Checkout specific styles */
        .checkout-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f9fc 0%, #ffffff 100%);
            padding: 40px 0;
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .checkout-header .logo {
            display: inline-flex;
            margin-bottom: 20px;
        }

        .checkout-header h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--color-text-primary);
        }

        .checkout-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 992px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }

        .checkout-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .checkout-card h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--color-border);
        }

        /* Order Summary */
        .checkout-items {
            margin-bottom: 24px;
        }

        .checkout-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--color-border);
        }

        .checkout-item:last-child {
            border-bottom: none;
        }

        .checkout-item-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 8px;
            background: var(--color-cream);
        }

        .checkout-item-info {
            flex: 1;
        }

        .checkout-item-info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .checkout-item-info p {
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .checkout-item-price {
            font-weight: 600;
            color: var(--color-primary);
        }

        /* Totals */
        .checkout-totals {
            border-top: 2px solid var(--color-border);
            padding-top: 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9375rem;
        }

        .total-row.savings {
            color: var(--color-accent);
        }

        .total-row.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
            border-top: 1px solid var(--color-border);
            margin-top: 8px;
            padding-top: 16px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9375rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .form-group input.error,
        .form-group select.error,
        .form-group textarea.error {
            border-color: #e53935;
        }

        .error-message {
            color: #e53935;
            font-size: 0.875rem;
            margin-top: 4px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* Trust Badges */
        .trust-badges-checkout {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .trust-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--color-text-secondary);
        }

        .trust-badge i {
            color: var(--color-accent);
        }

        /* Secure Notice */
        .secure-notice {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--color-cream);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .secure-notice i {
            font-size: 1.5rem;
            color: var(--color-accent);
        }

        .secure-notice p {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin: 0;
        }

        /* Submit Button */
        .checkout-submit {
            width: 100%;
            padding: 16px;
            font-size: 1.125rem;
            margin-top: 8px;
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 40px;
        }

        .empty-cart i {
            font-size: 4rem;
            color: var(--color-border);
            margin-bottom: 16px;
        }

        .empty-cart h3 {
            margin-bottom: 8px;
        }

        .empty-cart p {
            color: var(--color-text-muted);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="checkout-page">
        <div class="checkout-header">
            <a href="/" class="logo">
                <img src="coffytab.png" alt="CoffyTab Logo" style="height: 60px;">
            </a>
            <h1>Güvenli Ödeme</h1>
        </div>

        <div class="checkout-container">
            <div class="checkout-grid">
                <!-- Sol: Sipariş Özeti -->
                <div class="checkout-card">
                    <h2><i class="fas fa-shopping-bag"></i> Sipariş Özeti</h2>
                    
                    <div class="checkout-items" id="checkout-items">
                        <!-- Cart items will be rendered here -->
                    </div>

                    <div class="checkout-totals">
                        <div class="total-row">
                            <span>Ara Toplam</span>
                            <span id="subtotal">₺0</span>
                        </div>
                        <div class="total-row savings" id="savings-row" style="display: none;">
                            <span>Tasarruf</span>
                            <span id="savings">-₺0</span>
                        </div>
                        <div class="total-row">
                            <span>Kargo</span>
                            <span id="shipping">Ücretsiz</span>
                        </div>
                        <div class="total-row total">
                            <span>Toplam</span>
                            <span id="total">₺0</span>
                        </div>
                    </div>

                    <div class="trust-badges-checkout">
                        <div class="trust-badge">
                            <i class="fas fa-shield-alt"></i>
                            <span>SSL Güvenli</span>
                        </div>
                        <div class="trust-badge">
                            <i class="fas fa-truck"></i>
                            <span>Hızlı Kargo</span>
                        </div>
                        <div class="trust-badge">
                            <i class="fas fa-undo"></i>
                            <span>Kolay İade</span>
                        </div>
                    </div>
                    
                    <!-- PayTR Logo -->
                    <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
                        <p style="font-size: 0.75rem; color: #666; margin-bottom: 8px;">Güvenli Ödeme Altyapısı</p>
                        <img src="https://www.paytr.com/img/paytr-logo.png" alt="PayTR" style="height: 30px; opacity: 0.8;">
                    </div>
                </div>

                <!-- Sağ: Teslimat Bilgileri -->
                <div class="checkout-card">
                    <h2><i class="fas fa-user"></i> Teslimat Bilgileri</h2>

                    <div class="secure-notice">
                        <i class="fas fa-lock"></i>
                        <p>Bilgileriniz 256-bit SSL şifreleme ile korunmaktadır. Bilgileriniz asla üçüncü taraflarla paylaşılmaz.</p>
                    </div>

                    <form id="checkout-form">
                        <!-- Müşteri Tipi Seçimi -->
                        <div class="form-group customer-type">
                            <label>Müşteri Tipi *</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="customer_type" value="individual" checked onchange="toggleCompanyFields()">
                                    <span>Bireysel</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="customer_type" value="company" onchange="toggleCompanyFields()">
                                    <span>Şirket</span>
                                </label>
                            </div>
                        </div>

                        <!-- Şirket Bilgileri (Gizli Başlangıçta) -->
                        <div id="company-fields" style="display: none;">
                            <div class="form-group">
                                <label for="company_name">Şirket Adı *</label>
                                <input type="text" id="company_name" name="company_name" placeholder="Şirket Adı">
                            </div>
                            <div class="form-group">
                                <label for="tax_number">Vergi Numarası *</label>
                                <input type="text" id="tax_number" name="tax_number" placeholder="Vergi No" maxlength="11">
                            </div>
                            <div class="form-group">
                                <label for="tax_office">Vergi Dairesi *</label>
                                <input type="text" id="tax_office" name="tax_office" placeholder="Vergi Dairesi">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">Ad *</label>
                                <input type="text" id="name" name="name" placeholder="Adınız" required>
                            </div>
                            <div class="form-group">
                                <label for="surname">Soyad *</label>
                                <input type="text" id="surname" name="surname" placeholder="Soyadınız" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">E-posta *</label>
                            <input type="email" id="email" name="email" placeholder="ornek@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Telefon *</label>
                            <input type="tel" id="phone" name="phone" placeholder="5XX XXX XX XX" required>
                        </div>

                        <div class="form-group">
                            <label for="address">Adres *</label>
                            <textarea id="address" name="address" placeholder="Sokak, bina no, daire no, mahalle" required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">İl *</label>
                                <select id="city" name="city" required>
                                    <option value="">İl Seçin</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="district">İlçe *</label>
                                <select id="district" name="district" required>
                                    <option value="">İlçe Seçin</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-large checkout-submit">
                            <i class="fas fa-lock"></i>
                            Ödemeye Geç ₺<span id="checkout-total">0</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/districts.js"></script>
    <script src="js/paytr-config.js"></script>
    <script src="js/paytr-payment.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/checkout.js"></script>
    <script>
        // Toggle company fields visibility
        function toggleCompanyFields() {
            const companyFields = document.getElementById('company-fields');
            const companyInputs = companyFields.querySelectorAll('input');
            const customerType = document.querySelector('input[name="customer_type"]:checked').value;
            
            if (customerType === 'company') {
                companyFields.style.display = 'block';
                companyInputs.forEach(input => input.setAttribute('required', 'required'));
            } else {
                companyFields.style.display = 'none';
                companyInputs.forEach(input => input.removeAttribute('required'));
            }
        }
    </script>
</body>
</html>
